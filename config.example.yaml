# ============================================================
#  Kalshi Bot configuration
#  1. Copy this file to "config.yaml"
#  2. Fill in your API key id and the path to your .key file
#  3. Leave environment as "demo" until you trust the bot
# ============================================================

# "demo"  = fake money sandbox (https://demo.kalshi.co)  <-- START HERE
# "live"  = real money on Kalshi.com
environment: demo

api:
  # Paste the API Key ID shown when you created your key
  key_id: "PASTE-YOUR-API-KEY-ID-HERE"
  # Path to the .key file you downloaded from Kalshi
  private_key_path: "kalshi-demo.key"

# ---- Money / risk limits (all amounts in US dollars) -------
risk:
  max_trades_per_day: 20          # hard stop on number of orders placed per day
  max_position_dollars: 2.00      # most you'll ever hold in a single market
  max_open_dollars: 10.00         # most capital deployed across all markets at once
  max_daily_loss_dollars: 5.00    # if realized+unrealized loss hits this, bot stops for the day
  min_cash_reserve_dollars: 1.00  # never spend below this; safety floor

# ---- Which markets the bot looks at ------------------------
markets:
  # How many of the most liquid markets to scan each cycle
  scan_top_n: 40
  # Skip markets thinner than this (contracts available at top of book)
  min_book_depth: 20
  # Only trade markets whose bid-ask spread is at least this many cents
  # (need room to make money after fees)
  min_spread_cents: 3
  # Avoid markets priced in the extreme tails (cheap longshots / near-certainties)
  min_price_cents: 15
  max_price_cents: 85

# ---- Strategy selection ------------------------------------
# Options: "maker"  (conservative spread capture, default)
#          "momentum" (simple example signal strategy)
strategy: maker

strategy_params:
  maker:
    # How far inside the spread to post, in cents
    edge_cents: 1
    # Contracts per order (1 contract costs price-in-cents / 100 dollars)
    order_size: 1
  momentum:
    lookback_cycles: 5
    order_size: 1

# ---- Loop timing -------------------------------------------
engine:
  cycle_seconds: 60        # how often the bot wakes up and re-evaluates
  cancel_stale_after_s: 300  # cancel resting orders older than this
